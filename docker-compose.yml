services:
  db:
    image: postgres:16-alpine
    container_name: garden-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garden_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garden_secret}
      POSTGRES_DB: ${POSTGRES_DB:-garden_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garden_user} -d ${POSTGRES_DB:-garden_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garden-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-garden_user}:${POSTGRES_PASSWORD:-garden_secret}@db:5432/${POSTGRES_DB:-garden_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/images:/app/images
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
